<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ICFES Platform</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --accent-dark: #2980b9;
            --success: #2ecc71;
            --error: #e74c3c;
            --bg: #e0e5ec;
            --sidebar-w: 260px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Arial Rounded MT Bold', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- BOTÓN HAMBURGUESA --- */
        #menu-btn {
            position: fixed; top: 15px; left: 15px; z-index: 1002;
            font-size: 1.8rem; cursor: pointer; background: var(--bg);
            border: none; color: var(--primary); width: 45px; height: 45px;
            border-radius: 10px; box-shadow: 3px 3px 6px #b8b9be, -3px -3px 6px #ffffff;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed; left: calc(-1 * var(--sidebar-w)); top: 0;
            width: var(--sidebar-w); height: 100%; background: var(--primary);
            color: white; transition: 0.3s ease; z-index: 1001;
            padding: 80px 20px 20px 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.3);
        }
        .sidebar.active { left: 0; }
        .sidebar h2 { font-size: 1.2rem; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin: 0; }
        .sidebar ul { list-style: none; padding: 0; margin-top: 20px; }
        .sidebar li { 
            padding: 15px; margin-bottom: 10px; background: rgba(255,255,255,0.05); 
            border-radius: 12px; cursor: pointer; transition: 0.2s;
        }
        .sidebar li.active-topic { background: var(--accent); }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; padding: 15px; display: flex; flex-direction: column; align-items: center; width: 100%; margin-top: 10px; }

        .header-container {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; max-width: 900px; margin-bottom: 25px; padding: 10px 0;
        }
        h1 { font-size: 1.4rem; color: var(--primary); text-transform: uppercase; margin: 0; flex-grow: 1; text-align: center; }

        /* BOTONES DE NAVEGACIÓN */
        .nav-btn {
            background: var(--bg); border: none; width: 45px; height: 45px; border-radius: 50%;
            box-shadow: 4px 4px 8px #b8b9be, -4px -4px 8px #ffffff; cursor: pointer;
            color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
            transition: opacity 0.3s;
        }
        .nav-btn:active:not(:disabled) { box-shadow: inset 2px 2px 5px #b8b9be; }
        
        /* Estado desactivado */
        .nav-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* --- COMPONENTES JUEGO --- */
        .options-container {
            display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;
            padding: 20px; background: var(--bg); border-radius: 20px;
            box-shadow: 7px 7px 12px #b8b9be, -7px -7px 12px #ffffff;
            width: 100%; max-width: 850px; margin-bottom: 30px; min-height: 80px;
        }

        .option {
            min-width: 110px; height: 45px; background: var(--accent); color: white;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-weight: bold; cursor: grab; touch-action: none;
            border-bottom: 4px solid var(--accent-dark); box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .quiz-container { width: 100%; max-width: 850px; display: flex; flex-direction: column; gap: 18px; }

        .question-card {
            background: var(--bg); padding: 18px; border-radius: 18px;
            box-shadow: 5px 5px 10px #b8b9be, -5px -5px 10px #ffffff;
            display: grid; grid-template-columns: 1fr 200px; align-items: center; gap: 20px;
        }

        .drop-zone {
            height: 55px; border-radius: 12px; background: var(--bg);
            box-shadow: inset 4px 4px 8px #b8b9be, inset -4px -4px 8px #ffffff;
            display: flex; align-items: center; justify-content: center;
        }
        .drop-zone .option { width: 100%; height: 100%; border-bottom: 0; box-shadow: none; }

        .is-correct .option { background: var(--success) !important; }
        .is-incorrect .option { background: var(--error) !important; }

        #verify-btn {
            margin: 40px 0; padding: 18px 60px; background: var(--primary);
            color: white; border: none; border-bottom: 5px solid #1a252f;
            border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 1.1rem;
        }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .overlay.active { display: block; }

        @media (max-width: 650px) {
            .question-card { grid-template-columns: 1fr; text-align: center; }
            h1 { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <button id="menu-btn">☰</button>
    <div class="overlay" id="overlay"></div>
    <div class="sidebar" id="sidebar">
        <h2>TEMAS DISPONIBLES</h2>
        <ul id="topic-list"></ul>
    </div>

    <div class="main-content">
        <header class="header-container">
            <button class="nav-btn" id="prev-btn">❮</button>
            <h1 id="current-title">Cargando...</h1>
            <button class="nav-btn" id="next-btn">❯</button>
        </header>

        <div class="options-container" id="options-bin"></div>
        <div class="quiz-container" id="quiz-container"></div>
        <button id="verify-btn">VERIFICAR RESPUESTAS</button>
    </div>

    <script>
        const DATA = [
            {
                title: "Professions",
                options: [
                    { id: "A", text: "A. chefs" }, { id: "B", text: "B. dentists" },
                    { id: "C", text: "C. drivers" }, { id: "D", text: "D. farmers" },
                    { id: "E", text: "E. guitarists" }, { id: "F", text: "F. nurses" },
                    { id: "G", text: "G. painters" }
                ],
                questions: [
                    { q: "80. You visit them when your teeth hurt.", ans: "B" },
                    { q: "81. They make fantastic food in restaurants.", ans: "A" },
                    { q: "82. They take people from one place to another on a bus.", ans: "C" },
                    { q: "83. They help you get better when you’re sick or had an accident.", ans: "F" },
                    { q: "84. Some of these famous artists show their art in museums.", ans: "G" }
                ]
            },
            {
                title: "House",
                options: [
                    { id: "A", text: "A. armchair" }, { id: "B", text: "B. bed" },
                    { id: "C", text: "C. blanket" }, { id: "D", text: "D. bookcase" },
                    { id: "E", text: "E. cupboard" }, { id: "F", text: "F. picture" },
                    { id: "G", text: "G. shower" }, { id: "H", text: "H. towel" }
                ],
                questions: [
                    { q: "85. People put their books in this.", ans: "D" },
                    { q: "86. You wash your body in this place.", ans: "G" },
                    { q: "87. You usually sleep on it at night.", ans: "B" },
                    { q: "88. You can sit on one of these in the living room.", ans: "A" },
                    { q: "89. People like to use this when they are cold.", ans: "C" }
                ]
            }
        ];

        let currentIdx = 0;
        let draggedItem = null;

        const bin = document.getElementById('options-bin');
        const quiz = document.getElementById('quiz-container');
        const title = document.getElementById('current-title');
        const topicList = document.getElementById('topic-list');
        const btnPrev = document.getElementById('prev-btn');
        const btnNext = document.getElementById('next-btn');

        function loadTopic(idx) {
            currentIdx = idx;
            const data = DATA[currentIdx];
            title.innerText = data.title;
            bin.innerHTML = "";
            quiz.innerHTML = "";

            data.options.forEach(opt => {
                const div = document.createElement('div');
                div.className = "option";
                div.draggable = true;
                div.innerText = opt.text;
                div.dataset.ans = opt.id;
                div.addEventListener('dragstart', () => draggedItem = div);
                div.addEventListener('touchstart', () => draggedItem = div, {passive: true});
                bin.appendChild(div);
            });

            data.questions.forEach(item => {
                const card = document.createElement('div');
                card.className = "question-card";
                card.innerHTML = `<span class="question-text">${item.q}</span><div class="drop-zone" data-expected="${item.ans}"></div>`;
                quiz.appendChild(card);
            });

            document.querySelectorAll('.drop-zone').forEach(zone => {
                zone.addEventListener('dragover', e => e.preventDefault());
                zone.addEventListener('drop', () => {
                    if (zone.children.length > 0) bin.appendChild(zone.children[0]);
                    zone.appendChild(draggedItem);
                    zone.classList.remove('is-correct', 'is-incorrect');
                });
            });
            
            updateSidebar();
            updateNavButtons();
        }

        // LÓGICA DE DESACTIVAR BOTONES
        function updateNavButtons() {
            btnPrev.disabled = (currentIdx === 0);
            btnNext.disabled = (currentIdx === DATA.length - 1);
        }

        function updateSidebar() {
            topicList.innerHTML = "";
            DATA.forEach((t, i) => {
                const li = document.createElement('li');
                li.innerText = `${i + 1}. ${t.title}`;
                if (i === currentIdx) li.className = "active-topic";
                li.onclick = () => { loadTopic(i); closeMenu(); };
                topicList.appendChild(li);
            });
        }

        btnPrev.onclick = () => { if(currentIdx > 0) loadTopic(currentIdx - 1); };
        btnNext.onclick = () => { if(currentIdx < DATA.length - 1) loadTopic(currentIdx + 1); };

        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const closeMenu = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); };
        document.getElementById('menu-btn').onclick = () => { sidebar.classList.add('active'); overlay.classList.add('active'); };
        overlay.onclick = closeMenu;

        function playSound(freq) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.5);
        }

        document.getElementById('verify-btn').onclick = () => {
            const zones = document.querySelectorAll('.drop-zone');
            let allCorrect = true;
            let filled = 0;
            zones.forEach(zone => {
                const child = zone.firstElementChild;
                if (child) {
                    filled++;
                    const isRight = child.dataset.ans === zone.dataset.expected;
                    zone.classList.add(isRight ? 'is-correct' : 'is-incorrect');
                    if (!isRight) allCorrect = false;
                }
            });
            if (filled > 0) allCorrect ? playSound(880) : playSound(150);
        };

        loadTopic(0);
    </script>
</body>
</html>
