    <meta charset="UTF-8">

    <title>ICFES Platform - Tap & Place</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --accent-dark: #2980b9;
            --success: #2ecc71;
            --error: #e74c3c;
            --bg: #e0e5ec;
            --sidebar-w: 250px;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            font-family: 'Arial Rounded MT Bold', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- MENÚ HAMBURGUESA --- */
        #menu-btn {
            position: fixed; top: 10px; left: 10px; z-index: 1002;
            font-size: 1.3rem; cursor: pointer; background: var(--bg);
            border: none; color: var(--primary); width: 40px; height: 40px;
            border-radius: 8px; box-shadow: 2px 2px 5px #b8b9be, -2px -2px 5px #ffffff;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- SIDEBAR CON SCROLL --- */
        .sidebar {
            position: fixed; left: calc(-1 * var(--sidebar-w)); top: 0;
            width: var(--sidebar-w); height: 100%; background: var(--primary);
            color: white; transition: 0.3s ease; z-index: 1001;
            padding: 60px 15px 20px 15px; box-shadow: 5px 0 15px rgba(0,0,0,0.3);
            overflow-y: auto; 
        }
        .sidebar.active { left: 0; }
        .sidebar h2 { font-size: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .sidebar ul { list-style: none; padding: 0; margin-top: 15px;}
        .sidebar li { padding: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; font-size: 0.85rem; cursor: pointer;}
        .sidebar li.active-topic { background: var(--accent); }

        /* --- MAIN CONTENT --- */
        .main-content { 
            flex: 1; padding: 10px; display: flex; 
            flex-direction: column; align-items: center; 
            width: 100%; margin-top: 50px; 
        }

        .header-container {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; max-width: 600px; margin-bottom: 15px;
        }
        h1 { font-size: 1rem; color: var(--primary); text-transform: uppercase; margin: 0; text-align: center; flex: 1; }

        .nav-btn {
            background: var(--bg); border: none; width: 35px; height: 35px; border-radius: 50%;
            box-shadow: 2px 2px 5px #b8b9be, -2px -2px 5px #ffffff; color: var(--primary);
            display: flex; align-items: center; justify-content: center; font-size: 1rem;
        }
        .nav-btn:disabled { opacity: 0.2; }

        /* --- BANCO DE PALABRAS --- */
        .options-container {
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
            padding: 12px; background: var(--bg); border-radius: 15px;
            box-shadow: 4px 4px 8px #b8b9be, -4px -4px 8px #ffffff;
            width: 100%; max-width: 600px; margin-bottom: 20px; min-height: 50px;
        }

        .option {
            padding: 8px 12px; min-width: 80px; height: 35px; background: var(--accent); color: white;
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 0.75rem; cursor: pointer;
            border-bottom: 3px solid var(--accent-dark); box-shadow: 0 3px 5px rgba(0,0,0,0.1);
            transition: 0.2s;
        }

        .option.selected {
            background: #f1c40f;
            border-bottom-color: #f39c12;
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }

        /* --- CUESTIONARIO --- */
        .quiz-container { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 10px; }

        .question-card {
            background: var(--bg); padding: 12px; border-radius: 12px;
            box-shadow: 3px 3px 6px #b8b9be, -3px -3px 6px #ffffff;
            display: grid; grid-template-columns: 1fr 80px;
            align-items: center; gap: 10px;
        }

        .question-text { font-size: 0.85rem; color: #444; line-height: 1.2; }

        .drop-zone {
            width: 80px; height: 40px; border-radius: 8px; background: var(--bg);
            box-shadow: inset 3px 3px 6px #b8b9be, inset -3px -3px 6px #ffffff;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative;
        }

        .drop-zone .option { width: 100%; height: 100%; border-bottom: 0; font-size: 0.7rem; padding: 2px; }

        .is-correct .option { background: var(--success) !important; }
        .is-incorrect .option { background: var(--error) !important; }

        #verify-btn {
            margin: 25px 0 40px 0; padding: 12px 40px; background: var(--primary);
            color: white; border: none; border-bottom: 4px solid #1a252f;
            border-radius: 10px; font-weight: bold; font-size: 1rem; cursor: pointer;
        }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .overlay.active { display: block; }
    </style>
</head>

                div.className = "option";
                div.innerText = opt.text;
                div.dataset.ans = opt.id;
                div.onclick = (e) => {
                    e.stopPropagation();
                    if (selectedOption === div) {
                        div.classList.remove('selected');
                        selectedOption = null;
                    } else {
                        if (selectedOption) selectedOption.classList.remove('selected');
                        div.classList.add('selected');
                        selectedOption = div;
                    }
                };
                bin.appendChild(div);
            });

            data.questions.forEach(item => {
                const card = document.createElement('div');
                card.className = "question-card";
                const zone = document.createElement('div');
                zone.className = "drop-zone";
                zone.dataset.expected = item.ans;
                
                zone.onclick = () => {
                    if (selectedOption) {
                        if (zone.children.length > 0) bin.appendChild(zone.children[0]);
                        zone.appendChild(selectedOption);
                        selectedOption.classList.remove('selected');
                        selectedOption = null;
                        zone.classList.remove('is-correct', 'is-incorrect');
                    } else if (zone.children.length > 0) {
                        bin.appendChild(zone.children[0]);
                    }
                };

                card.innerHTML = `<span class="question-text">${item.q}</span>`;
                card.appendChild(zone);
                quiz.appendChild(card);
            });
            
            updateSidebar();
            updateNavButtons();
        }

        function updateNavButtons() {
            btnPrev.disabled = (currentIdx === 0);
            btnNext.disabled = (currentIdx === DATA.length - 1);
        }

        function updateSidebar() {
            topicList.innerHTML = "";
            DATA.forEach((t, i) => {
                const li = document.createElement('li');
                li.innerText = `${i + 1}. ${t.title}`;
                if (i === currentIdx) li.className = "active-topic";
                li.onclick = () => { loadTopic(i); closeMenu(); };
                topicList.appendChild(li);
            });
        }

        btnPrev.onclick = () => { if(currentIdx > 0) loadTopic(currentIdx - 1); };
        btnNext.onclick = () => { if(currentIdx < DATA.length - 1) loadTopic(currentIdx + 1); };

        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const closeMenu = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); };
        document.getElementById('menu-btn').onclick = () => { sidebar.classList.add('active'); overlay.classList.add('active'); };
        overlay.onclick = closeMenu;

        function playSound(freq) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.5);
            } catch(e) {}
        }

        document.getElementById('verify-btn').addEventListener('click', () => {
            const zones = document.querySelectorAll('.drop-zone');
            let allCorrect = true;
            let filled = 0;
            zones.forEach(zone => {
                const child = zone.firstElementChild;
                if (child) {
                    filled++;
                    const isRight = child.dataset.ans === zone.dataset.expected;
                    zone.classList.add(isRight ? 'is-correct' : 'is-incorrect');
                    if (!isRight) allCorrect = false;
                }
            });
            if (filled > 0) allCorrect ? playSound(880) : playSound(150);
        });

        loadTopic(0);
    </script>
</body>
</html>
